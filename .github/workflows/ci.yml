name: NestJS CI/CD

on:
  push:
    branches: [master, qa, develop]
  pull_request:
    branches: [master, qa, develop]

jobs:
  secret-scanning:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-scanning:
    name: 🔍 Code Scanning (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [secret-scanning, code-scanning]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  approval:
    name: 👀 Awaiting Approval
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    environment: approval
    steps:
      - name: Approval granted
        run: echo "Approved, proceeding with build and deploy"

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [approval]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set Railway environment
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          if [ "$TARGET_BRANCH" == "master" ]; then
            echo "RAILWAY_ENVIRONMENT_ID=${{ secrets.RAILWAY_ENVIRONMENT_ID_PROD }}" >> $GITHUB_ENV
            echo "RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN_PROD }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Production 🟢" >> $GITHUB_ENV
          elif [ "$TARGET_BRANCH" == "qa" ]; then
            echo "RAILWAY_ENVIRONMENT_ID=${{ secrets.RAILWAY_ENVIRONMENT_ID_QA }}" >> $GITHUB_ENV
            echo "RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN_QA }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=QA 🟡" >> $GITHUB_ENV
          else
            echo "RAILWAY_ENVIRONMENT_ID=${{ secrets.RAILWAY_ENVIRONMENT_ID_DEV }}" >> $GITHUB_ENV
            echo "RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN_DEV }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Development 🔵" >> $GITHUB_ENV
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy (${{ env.DEPLOY_ENV }})
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment ${{ env.RAILWAY_ENVIRONMENT_ID }} --message "${{ github.event.pull_request.title }}"

      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
